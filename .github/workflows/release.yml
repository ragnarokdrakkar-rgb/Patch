name: Build and publish Windows release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag v$tagVersion se ne ujema s package.json verzijo $packageVersion."
          }

      - name: Build Windows installer
        run: npm run make -- --publish never

      - name: Verify release files
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $files = @(
            "dist/Depo-Injekcije-PSA-Setup-$version.exe",
            "dist/Depo-Injekcije-PSA-Setup-$version.exe.blockmap",
            "dist/latest.yml"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Manjka release datoteka: $file"
            }
          }

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $assets = @(
            "dist/Depo-Injekcije-PSA-Setup-$version.exe",
            "dist/Depo-Injekcije-PSA-Setup-$version.exe.blockmap",
            "dist/latest.yml"
          )

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag ze obstaja. Nalagam oziroma zamenjujem assets."
            gh release upload $tag @assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            Write-Host "Ustvarjam release $tag."
            gh release create $tag @assets `
              --title $tag `
              --generate-notes `
              --repo $env:GITHUB_REPOSITORY
          }
