name: Build and publish Windows release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag v$tagVersion se ne ujema s package.json verzijo $packageVersion."
          }

      - name: Build and publish release
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
